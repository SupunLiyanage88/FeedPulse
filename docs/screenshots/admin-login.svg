<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Admin Login screenshot placeholder">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .title { font: 700 40px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: #0f172a; }
      .text { font: 500 22px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: #334155; }
      .muted { font: 400 18px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: #64748b; }
      .dash { fill: none; stroke: #94a3b8; stroke-width: 3; stroke-dasharray: 10 10; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="675" />

  <rect class="card" x="260" y="110" width="680" height="455" rx="24" />
  <rect class="dash" x="290" y="160" width="620" height="355" rx="18" />

  <text class="title" x="320" y="230">Admin Login</text>
  <text class="text" x="320" y="285">Screenshot placeholder</text>
  <text class="muted" x="320" y="330">Replace this file with a real screenshot:</text>
  <text class="muted" x="320" y="365">docs/screenshots/admin-login.png (or .jpg)</text>

  <text class="muted" x="320" y="435">Suggested capture:</text>
  <text class="muted" x="320" y="470">- Open http://localhost:3000/admin/login</text>
</svg>
